<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>La Perla Admin - Pro</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
    body{ font-family:Arial, sans-serif; margin:0; background:#0f172a; color:#e2e8f0; line-height: 1.5; }
    header{ background:#111827; padding:20px 15px; text-align:center; font-size:22px; font-weight:bold; border-bottom: 2px solid #1e293b; position: sticky; top:0; z-index:100; display:flex; justify-content:center; align-items:center;}
    .container{ display:flex; flex-direction: column; padding:15px; gap:15px; }
    .card{ background:#1e293b; padding:15px; border-radius:12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    input, button, select{ padding:12px; border-radius:8px; border:none; margin:5px 0; width:100%; box-sizing:border-box; font-size: 16px; }
    button{ cursor:pointer; font-weight:bold; }
    button:active { opacity: 0.7; }
    
    #loginView { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
    .login-box { background: #1e293b; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #38bdf8; }
    
    .player{ background:#0b1220; padding:15px; border-radius:10px; margin-top:10px; border: 1px solid #1e293b; }
    .badge{ display:inline-block; padding:4px 10px; border-radius:8px; font-size:12px; font-weight: bold; margin: 5px 0; }
    .debt{background:orange; color:black;}
    .paidGreen{background:#22c55e; color:black;}
    .packGray{background:#475569; color:white;}
    .packGreen{background:#10b981; color:white;}
    .deleteBtn{background:#ef4444; color:#fff; margin-top: 10px; font-size: 14px;}
    .viewBtn{background:#3b82f6; color:white;}
    .backBtn{background:#64748b; color:white; margin-bottom: 15px;}
    .wsBtn{background:#25d366; color:white; text-decoration:none; display:block; text-align:center; padding:12px; border-radius:8px; margin-top:5px; font-weight:bold;}
    .stateGreen{background:#22c55e; color:black;}
    .stateYellow{background:#f59e0b; color:black;}
    .stateRed{background:#ef4444; color:white;}
    
    #searchInput { background: #1e293b; color: white; border: 2px solid #334155; margin-bottom: 10px; }
    .history-item { background: #1e293b; padding: 8px; border-radius: 6px; margin-top: 5px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #38bdf8; }
    .expense-item { background: #0f172a; padding: 8px; border-radius: 6px; margin-top: 5px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ef4444; }
    .rev-detail { font-size: 13px; color: #94a3b8; margin-top: 10px; background: #0f172a; padding: 10px; border-radius: 6px; }
    .del-icon { background: #ef4444; color: white; width: 25px; height: 25px; border-radius: 50%; padding: 0; line-height: 1; font-size: 12px; border:none; margin:0; }
    .btn-config { position:absolute; right:15px; background:transparent; border:1px solid #38bdf8; color:#38bdf8; padding:5px 10px; width:auto; border-radius:6px; font-size:14px; }
</style>
</head>
<body>

<header>
    🏓 La Perla
    <button class="btn-config" id="configBtn" style="display:none;" onclick="showView('settings')">⚙️ Precios</button>
</header>

<div class="container">
    <div id="loginView">
        <div class="login-box">
            <h2 style="color: #38bdf8;">Acceso Restringido</h2>
            <input type="password" id="passInput" placeholder="Contraseña" style="text-align: center;">
            <button onclick="checkLogin()" style="background: #38bdf8; color: black; margin-top: 15px;">Entrar</button>
            <p id="loginError" style="color: #ef4444; display: none; margin-top: 10px; font-size: 14px;">❌ Contraseña incorrecta</p>
        </div>
    </div>

    <div id="mainContent" style="display:none;">
        <div class="card">
            <h3>📅 Mes y Balance</h3>
            <select id="monthSelect" onchange="setMonth(this.value)"></select>
            <div id="revenueTotal" class="rev-detail"></div>
        </div>

        <div id="listView">
            <div class="card">
                <h3>💸 Gastos del Mes</h3>
                <div style="display:flex; gap:5px;">
                    <input id="expDesc" placeholder="Ej: Pelotas, Profe..." style="flex:2; margin:0;"/>
                    <input id="expAmount" type="number" placeholder="$ Monto" style="flex:1.2; margin:0;"/>
                    <button class="deleteBtn" onclick="addExpense()" style="flex:1; margin:0;">Cargar</button>
                </div>
                <div id="expensesList" style="margin-top:10px;"></div>
            </div>

            <div class="card">
                <h3>➕ Agregar Jugador</h3>
                <div style="display:flex; gap:5px;">
                    <input id="name" placeholder="Nombre completo" style="margin:0;" />
                    <button onclick="addPlayer()" style="background:#38bdf8; color: black; margin:0; width:100px;">Agregar</button>
                </div>
            </div>

            <div class="card">
                <h3>👥 Jugadores</h3>
                <input type="text" id="searchInput" placeholder="🔍 Buscar jugador..." onkeyup="render()">
                <div id="players"></div>
            </div>
            
            <div class="card">
                <h3>🗓️ Asistencia Viernes</h3>
                <div id="fridays"></div>
            </div>
        </div>

        <div class="card" id="profileView" style="display:none;"></div>
        <div class="card" id="fridayView" style="display:none;"></div>
        
        <div class="card" id="settingsView" style="display:none;">
            <button class='backBtn' onclick="showView('list')">⬅ Volver al inicio</button>
            <h3 style="color:#38bdf8;">⚙️ Configurar Precios</h3>
            <p style="font-size:14px; color:#94a3b8;">Los valores que cambies acá afectarán las deudas de todos los jugadores.</p>
            <label>Cuota 1 vez/sem ($):</label>
            <input id="p_plan1" type="number"/>
            <label>Cuota 2 veces/sem ($):</label>
            <input id="p_plan2" type="number"/>
            <label>Viernes Suelto ($):</label>
            <input id="p_friday" type="number"/>
            <label>Pack Viernes ($):</label>
            <input id="p_pack" type="number"/>
            <button class="paidGreen" onclick="savePrices()" style="margin-top:15px;">Guardar Precios</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD1v_l8XF2UVwcXcfNcquhekDv26GNAV8",
  authDomain: "la-perla-admin.firebaseapp.com",
  databaseURL: "https://la-perla-admin-default-rtdb.firebaseio.com",
  projectId: "la-perla-admin",
  storageBucket: "la-perla-admin.firebasestorage.app",
  messagingSenderId: "519870028939",
  appId: "1:519870028939:web:9b174bac162ac8dcc2088e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MASTER_PASS = "19122001";
let isLoggedIn = false;

// NUEVA ESTRUCTURA (incluye expenses y prices)
let data = { 
    players:[], fridayAttendance:{}, fridayPack:{}, plans:{}, monthPayments:{}, history:{}, expenses:{},
    prices: { plan1: 30000, plan2: 45000, friday: 8000, packFriday: 20000 }
};

let now = new Date();
function getMonthName(date){ return date.toLocaleString('es-AR',{month:'long',year:'numeric'}); }
let selectedMonth = getMonthName(now); 
let currentView = 'list';
let selectedPlayer = null;
let selectedFriday = null;

function checkLogin() {
    if(document.getElementById('passInput').value === MASTER_PASS) {
        isLoggedIn = true;
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('configBtn').style.display = 'block';
        render();
    } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('passInput').value = '';
    }
}

document.getElementById('passInput').addEventListener('keypress', e => { if(e.key === 'Enter') checkLogin(); });

db.ref('perlaData').on('value', (snapshot) => {
    const cloudData = snapshot.val();
    if(cloudData) { 
        data = { ...data, ...cloudData }; 
        if(!data.players) data.players = [];
        if(!data.prices) data.prices = { plan1: 30000, plan2: 45000, friday: 8000, packFriday: 20000 };
        if(!data.expenses) data.expenses = {};
    }
    if(isLoggedIn) render();
});

function save(){ db.ref('perlaData').set(data); }

function setMonth(m){ selectedMonth = m; render(); }

function updateMonthSelector(){
    let sel=document.getElementById('monthSelect');
    if(sel.options.length > 0) return;
    let options = [];
    for(let i = 0; i < 12; i++){ let d = new Date(2026, i, 1); options.push(getMonthName(d)); }
    sel.innerHTML='';
    options.forEach(m=>{
        let opt=document.createElement('option'); opt.value=m; opt.textContent=m;
        if(m===selectedMonth) opt.selected=true; 
        sel.appendChild(opt);
    });
}

// ----- PRECIOS -----
function loadPricesUI() {
    document.getElementById('p_plan1').value = data.prices.plan1;
    document.getElementById('p_plan2').value = data.prices.plan2;
    document.getElementById('p_friday').value = data.prices.friday;
    document.getElementById('p_pack').value = data.prices.packFriday;
}

function savePrices() {
    data.prices.plan1 = parseInt(document.getElementById('p_plan1').value) || 0;
    data.prices.plan2 = parseInt(document.getElementById('p_plan2').value) || 0;
    data.prices.friday = parseInt(document.getElementById('p_friday').value) || 0;
    data.prices.packFriday = parseInt(document.getElementById('p_pack').value) || 0;
    save();
    alert("¡Precios actualizados con éxito!");
    showView('list');
}

// ----- GASTOS -----
function addExpense() {
    let desc = document.getElementById('expDesc').value.trim();
    let amt = parseInt(document.getElementById('expAmount').value);
    if(!desc || !amt) return;
    if(!data.expenses[selectedMonth]) data.expenses[selectedMonth] = [];
    data.expenses[selectedMonth].push({ id: Date.now(), desc: desc, amount: amt });
    document.getElementById('expDesc').value = '';
    document.getElementById('expAmount').value = '';
    save();
}

function removeExpense(id) {
    if(!confirm("¿Eliminar este gasto?")) return;
    data.expenses[selectedMonth] = data.expenses[selectedMonth].filter(e => e.id !== id);
    save();
}

// ----- JUGADORES Y DEUDAS -----
function addPlayer(){
    let name=document.getElementById('name').value.trim();
    if(!name || data.players.includes(name)) return;
    data.players.push(name);
    document.getElementById('name').value = ''; save();
}

function removePlayer(p){
    if(!confirm(`¿Borrar definitivamente a ${p}?`)) return;
    data.players=data.players.filter(x=>x!==p); save();
}

function payMonth(p){
    let amount=parseInt(document.getElementById('pay_'+p).value||0);
    if(!amount) return;
    if(!confirm(`¿Confirmar pago de $${amount} para ${p}?`)) return;
    if(!data.monthPayments) data.monthPayments = {};
    if(!data.monthPayments[selectedMonth]) data.monthPayments[selectedMonth]={};
    data.monthPayments[selectedMonth][p] = (data.monthPayments[selectedMonth][p] || 0) + amount;
    if(!data.history) data.history = {};
    if(!data.history[p]) data.history[p] = [];
    data.history[p].push({ id: Date.now(), date: new Date().toLocaleDateString('es-AR'), amount: amount, month: selectedMonth });
    document.getElementById('pay_'+p).value = '';
    save();
}

function deletePayment(player, paymentId) {
    if(!confirm("¿Borrar este registro de pago?")) return;
    let pIdx = data.history[player].findIndex(h => h.id === paymentId);
    if(pIdx > -1) {
        let payment = data.history[player][pIdx];
        if(data.monthPayments[payment.month] && data.monthPayments[payment.month][player]) {
            data.monthPayments[payment.month][player] -= payment.amount;
        }
        data.history[player].splice(pIdx, 1);
        save();
    }
}

function calcDebt(p){
    let mp = (data.monthPayments && data.monthPayments[selectedMonth]) ? data.monthPayments[selectedMonth][p] || 0 : 0;
    let planPrice = (data.plans && data.plans[p] == 2) ? data.prices.plan2 : data.prices.plan1;
    let fridayDebt = 0;
    if(!data.fridayPack || !data.fridayPack[p]){
        Object.keys(data.fridayAttendance || {}).forEach(k=>{
            if(k.startsWith(selectedMonth) && data.fridayAttendance[k][p]?.present && !data.fridayAttendance[k][p]?.paid) 
                fridayDebt += data.prices.friday;
        });
    }
    return Math.max(0, (planPrice - mp) + fridayDebt);
}

function getState(p){
    let debt = calcDebt(p);
    let paid = (data.monthPayments && data.monthPayments[selectedMonth]) ? data.monthPayments[selectedMonth][p] || 0 : 0;
    if(debt <= 0) return {text:'AL DÍA', cls:'stateGreen'};
    if(paid > 0) return {text:'PARCIAL', cls:'stateYellow'};
    return {text:'EN DEUDA', cls:'stateRed'};
}

function showView(view) {
    currentView = view;
    document.getElementById('listView').style.display = (view === 'list') ? 'block' : 'none';
    document.getElementById('profileView').style.display = (view === 'profile') ? 'block' : 'none';
    document.getElementById('fridayView').style.display = (view === 'friday') ? 'block' : 'none';
    document.getElementById('settingsView').style.display = (view === 'settings') ? 'block' : 'none';
    if(view === 'settings') loadPricesUI();
    render();
}

function render(){
    if(!isLoggedIn) return; 
    updateMonthSelector();
    updateRevenueUI();
    if(currentView === 'list') renderList();
    else if(currentView === 'profile') renderProfile();
    else if(currentView === 'friday') renderFridayView();
}

function updateRevenueUI() {
    let cuotas = 0; let sueltos = 0; let packs = 0; let gastos = 0;
    
    // Calcular Ingresos
    if(data.monthPayments && data.monthPayments[selectedMonth]){
        Object.values(data.monthPayments[selectedMonth]).forEach(v=>cuotas+=v);
    }
    Object.keys(data.fridayAttendance || {}).forEach(k=>{
        if(k.startsWith(selectedMonth)){
            Object.values(data.fridayAttendance[k]).forEach(v=>{ if(v.present && v.paid) sueltos+=data.prices.friday; });
        }
    });
    data.players.forEach(p => { if(data.fridayPack && data.fridayPack[p]) packs+=data.prices.packFriday; });
    
    let totalIngresos = cuotas + sueltos + packs;
    
    // Calcular Gastos
    if(data.expenses && data.expenses[selectedMonth]){
        data.expenses[selectedMonth].forEach(e => gastos += e.amount);
    }
    
    let neto = totalIngresos - gastos;
    
    document.getElementById('revenueTotal').innerHTML = `
        <div style="display:flex; justify-content:space-between; color:#22c55e;">
            <span>📈 Ingresos (Cuotas+Viernes):</span> <b>$${totalIngresos.toLocaleString()}</b>
        </div>
        <div style="display:flex; justify-content:space-between; color:#ef4444; border-bottom: 1px solid #334155; padding-bottom:5px; margin-bottom:5px;">
            <span>📉 Gastos Totales:</span> <b>-$${gastos.toLocaleString()}</b>
        </div>
        <div style="display:flex; justify-content:space-between; color:#38bdf8; font-size:1.2em;">
            <span>💰 CAJA NETA:</span> <b>$${neto.toLocaleString()}</b>
        </div>
    `;

    // Renderizar lista de gastos
    let elist = document.getElementById('expensesList');
    if(elist) {
        elist.innerHTML = '';
        if(data.expenses && data.expenses[selectedMonth] && data.expenses[selectedMonth].length > 0) {
            data.expenses[selectedMonth].forEach(e => {
                elist.innerHTML += `
                    <div class="expense-item">
                        <span>${e.desc}</span>
                        <div>
                            <b style="color:#ef4444; margin-right:10px;">-$${e.amount.toLocaleString()}</b>
                            <button class="del-icon" onclick="removeExpense(${e.id})">×</button>
                        </div>
                    </div>`;
            });
        } else {
            elist.innerHTML = `<p style="font-size:13px; color:#94a3b8; text-align:center;">Sin gastos registrados en ${selectedMonth}.</p>`;
        }
    }
}

function renderList(){
    let pd = document.getElementById('players'); pd.innerHTML = '';
    const search = document.getElementById('searchInput').value.toLowerCase();
    let sortedPlayers = [...data.players].sort();
    sortedPlayers.filter(p => p.toLowerCase().includes(search)).forEach(p => {
        let debt = calcDebt(p); let state = getState(p);
        let msj = encodeURIComponent(`Hola ${p}! 🏓 Resumen La Perla (${selectedMonth}): Saldo pendiente $${debt}.`);
        let packActivo = data.fridayPack && data.fridayPack[p];
        let el = document.createElement('div'); el.className='player';
        el.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b>${p}</b> <span class='badge ${state.cls}'>${state.text}</span>
            </div>
            <span class='badge debt'>Deuda: $${debt.toLocaleString()}</span>
            <div style="display:flex; gap:10px;">
                <select style="flex:1" onchange="if(!data.plans) data.plans={}; data.plans['${p}']=parseInt(this.value); save();">
                    <option value="1" ${(!data.plans || data.plans[p]!=2)?'selected':''}>1 vez/sem</option>
                    <option value="2" ${(data.plans && data.plans[p]==2)?'selected':''}>2 veces/sem</option>
                </select>
                <button class="${packActivo?'packGreen':'packGray'}" style="flex:1; font-size:12px;" onclick="if(!data.fridayPack) data.fridayPack={}; data.fridayPack['${p}']=!data.fridayPack['${p}']; save();">
                    ${packActivo?'Pack Viernes ✔':'Pack Viernes ✖'}
                </button>
            </div>
            <div style="display:flex; gap:5px;">
                <input id='pay_${p}' type='number' placeholder='Monto'/>
                <button class='paidGreen' onclick="payMonth('${p}')" style="flex:0.5">Cobrar</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                <button class='viewBtn' onclick="selectedPlayer='${p}'; showView('profile');">Historial</button>
                <a href="https://wa.me/?text=${msj}" target="_blank" class="wsBtn" style="margin-top:0">📲 Avisar</a>
            </div>
            <button class='deleteBtn' style="padding:8px;" onclick="removePlayer('${p}')">Eliminar Jugador</button>`;
        pd.appendChild(el);
    });
    
    let fr = document.getElementById('fridays'); fr.innerHTML = '';
    let monthsArr = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    let parts = selectedMonth.split(" de ");
    let mIdx = monthsArr.indexOf(parts[0].toLowerCase());
    let year = parseInt(parts[1]);
    for(let i=1; i<=31; i++){
        let d = new Date(year, mIdx, i);
        if(d.getMonth() !== mIdx) break;
        if(d.getDay() === 5){
            let b = document.createElement('button'); b.className='viewBtn'; b.style.marginBottom='10px';
            b.textContent = `Asistencia Viernes ${i}`;
            b.onclick = () => { selectedFriday = i; showView('friday'); };
            fr.appendChild(b);
        }
    }
}

function renderProfile(){
    let p = selectedPlayer;
    let history = data.history && data.history[p] ? data.history[p] : [];
    let html = `<button class='backBtn' onclick="showView('list')">⬅ Volver</button><h2>Historial de ${p}</h2>`;
    if(history.length === 0) html += '<p>Sin pagos registrados.</p>';
    else {
        history.slice().reverse().forEach(h => {
            html += `
            <div class="history-item">
                <span>${h.date} (${h.month})</span>
                <div>
                    <b style="margin-right:10px;">$${h.amount.toLocaleString()}</b>
                    <button class="del-icon" onclick="deletePayment('${p}', ${h.id})">×</button>
                </div>
            </div>`;
        });
    }
    document.getElementById('profileView').innerHTML = html;
}

function renderFridayView(){
    let f = selectedFriday; let k = selectedMonth + '-' + f;
    let html = `<button class='backBtn' onclick="showView('list')">⬅ Volver</button><h2>Viernes ${f}</h2>`;
    let sortedPlayers = [...data.players].sort();
    sortedPlayers.forEach(p => {
        let a = (data.fridayAttendance && data.fridayAttendance[k]) ? data.fridayAttendance[k][p] || {present:false, paid:false} : {present:false, paid:false};
        html += `
            <div class="player">
                <b>${p}</b><br>
                <div style="display:flex; gap:10px;">
                    <button class="${a.present?'stateGreen':'packGray'}" onclick="toggleFriday('${p}',${f})"> ${a.present?'✔ Presente':'✖ Ausente'} </button>
                    <button class="${a.paid?'stateGreen':'stateRed'}" onclick="toggleFridayPay('${p}',${f})" ${!a.present?'disabled':''}> ${a.paid?'💰 Pagó':'⏳ No pagó'} </button>
                </div>
            </div>`;
    });
    document.getElementById('fridayView').innerHTML = html;
}

function toggleFriday(p,d){
    let k=selectedMonth+'-'+d;
    if(!data.fridayAttendance) data.fridayAttendance={};
    if(!data.fridayAttendance[k]) data.fridayAttendance[k]={};
    if(!data.fridayAttendance[k][p]) data.fridayAttendance[k][p]={present:false,paid:false};
    data.fridayAttendance[k][p].present = !data.fridayAttendance[k][p].present;
    if(!data.fridayAttendance[k][p].present) data.fridayAttendance[k][p].paid = false;
    save();
}

function toggleFridayPay(p,d){ let k=selectedMonth+'-'+d; data.fridayAttendance[k][p].paid = !data.fridayAttendance[k][p].paid; save(); }
</script>
</body>
</html>
