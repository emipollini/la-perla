<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Perla - Gestión</title>
<link rel="manifest" href="manifest.json">
<style>
body { font-family: Arial; margin:0; background:linear-gradient(135deg,#0f172a,#1e3a8a); color:white; }
header { text-align:center; padding:20px; }
.container { background:white; color:black; margin:20px auto; padding:20px; border-radius:15px; width:95%; max-width:1100px; }
input, button { padding:12px; margin:5px; border-radius:10px; border:none; font-size:16px; }
button { cursor:pointer; background:#1e3a8a; color:white; }
button:hover { background:#2563eb; }
.dashboard { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; }
.card { flex:1; min-width:140px; padding:10px; border-radius:10px; color:white; text-align:center; }
.green{ background:green; }
.red{ background:red; }
.orange{ background:orange; }
.blue{ background:#1e3a8a; }

/* PC */
table { width:100%; border-collapse: collapse; margin-top:15px; }
th { background:#1e3a8a; color:white; }
th, td { border:1px solid #ddd; padding:10px; text-align:center; }

/* MOBILE CARDS */
.cards { display:none; }
.player-card {
 padding:15px;
 border-radius:15px;
 margin-bottom:12px;
 color:white;
}
.player-card h4 { margin:0 0 10px 0; }
.player-card .status { margin-bottom:10px; }
.player-card .actions button { width:48%; margin:1%; }

/* floating button */
.fab { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: #2563eb; color: white; font-size: 30px; border: none; display: none; align-items: center; justify-content: center; }

@media (max-width: 600px) {
 table { display:none; }
 .cards { display:block; }
 .dashboard { flex-direction:column; }
 .fab { display:flex; }
}
</style>
</head>
<body>
<header>
<h1>La Perla - Administración</h1>
</header>

<div class="container">
<div id="alert"></div>
<div class="dashboard" id="dashboard"></div>

<button onclick="resetMonth()">Nuevo Mes</button>
<button onclick="resetFriday()">Nuevo Viernes</button>

<h3>Agregar jugador</h3>
<input id="nameInput" placeholder="Nombre">
<button onclick="addPlayer()">Agregar</button>

<input id="search" placeholder="Buscar..." oninput="render()">

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Mes</th>
<th>Viernes</th>
<th></th>
</tr>
</thead>
<tbody id="playersTable"></tbody>
</table>

<div id="cards" class="cards"></div>

<h3>⚠️ Deudores viernes</h3>
<div id="fridayDebtors"></div>
</div>

<button class="fab" onclick="focusAdd()">+</button>

<script>
let players = JSON.parse(localStorage.getItem('players'));

// 🔧 FIX compatibilidad (antes friday era objeto, ahora número)
if(players){
 players = players.map(p => {
  if(typeof p.friday === 'object'){
    // convertir viejo formato a nuevo
    if(!p.friday.attended) return { ...p, friday: 0 };
    if(p.friday.attended && !p.friday.paid) return { ...p, friday: 1 };
    if(p.friday.attended && p.friday.paid) return { ...p, friday: 2 };
  }
  return p;
 });
}

if(!players || players.length === 0){
 players = [
  { name:"Juan Pérez", paid:false, friday:0 },
  { name:"Mateo Gómez", paid:true, friday:2 },
  { name:"Lucas Fernández", paid:false, friday:1 }
 ];
}

// friday states: 0 = no fue, 1 = fue y no pagó, 2 = fue y pagó

function save(){ localStorage.setItem('players', JSON.stringify(players)); render(); }
function addPlayer(){ const name = nameInput.value; if(!name) return; players.push({name, paid:false, friday:0}); save(); }
function togglePayment(i){ players[i].paid = !players[i].paid; save(); }
function toggleFriday(i){ players[i].friday = (players[i].friday + 1) % 3; save(); }
function deletePlayer(i){ players.splice(i,1); save(); }
function resetMonth(){ players.forEach(p=>p.paid=false); save(); }
function resetFriday(){ players.forEach(p=>p.friday=0); save(); }
function focusAdd(){ document.getElementById('nameInput').focus(); }

function getFridayText(state){
 if(state===0) return 'No fue';
 if(state===1) return 'Fue - No pagó';
 return 'Fue - Pagó';
}

function getCardColor(p){
 if(!p.paid) return '#dc2626'; // rojo
 if(p.friday===1) return 'orange';
 return 'green';
}

function render(){
 const table = document.getElementById('playersTable');
 const cards = document.getElementById('cards');
 const search = document.getElementById('search').value.toLowerCase();
 table.innerHTML=''; cards.innerHTML='';

 let total=players.length, paid=0, debt=0, friday=0, fridayDebt=0;
 let debtorsList=[];

 players.forEach((p,i)=>{
  if(p.paid) paid++; else debt++;
  if(p.friday>0) friday++;
  if(p.friday===1){ fridayDebt++; debtorsList.push(p.name); }

  if(!p.name.toLowerCase().includes(search)) return;

  table.innerHTML += `
  <tr>
   <td>${p.name}</td>
   <td onclick="togglePayment(${i})" style='color:${p.paid?'green':'red'}; cursor:pointer;'>${p.paid?'Pagado':'Debe'}</td>
   <td onclick="toggleFriday(${i})">${getFridayText(p.friday)}</td>
   <td><button onclick="deletePlayer(${i})">X</button></td>
  </tr>`;

  cards.innerHTML += `
  <div class="player-card" style="background:${getCardColor(p)}">
    <h4>${p.name}</h4>
    <div class="status">Mes: ${p.paid?'Pagado':'Debe'}</div>
    <div class="status">Viernes: ${getFridayText(p.friday)}</div>
    <div class="actions">
      <button onclick="togglePayment(${i})">Cambiar Mes</button>
      <button onclick="toggleFriday(${i})">Cambiar Viernes</button>
    </div>
    <button onclick="deletePlayer(${i})" style="background:black;width:100%;margin-top:5px;">Eliminar</button>
  </div>`;
 });

 document.getElementById('dashboard').innerHTML = `
 <div class='card blue'>Jugadores<br>${total}</div>
 <div class='card green'>Pagaron<br>${paid}</div>
 <div class='card red'>Deben<br>${debt}</div>
 <div class='card blue'>Viernes<br>${friday}</div>
 <div class='card orange'>No pagaron viernes<br>${fridayDebt}</div>`;

 document.getElementById('alert').innerHTML = fridayDebt>0 ? `<div style='background:orange;padding:10px;border-radius:10px;'>⚠️ ${fridayDebt} jugadores no pagaron viernes</div>` : '';
 document.getElementById('fridayDebtors').innerHTML = debtorsList.length ? debtorsList.join(', ') : 'Ninguno';
}

render();

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
